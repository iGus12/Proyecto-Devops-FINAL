name: Deploy Frontend

on:
  push:
    branches:
      - deploy  

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen Docker del Front
        uses: docker/build-push-action@v4
        with:
        
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
           
            docker pull ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest
            
            
            docker stop front-despacho-container || true
            docker rm front-despacho-container || true
            

            docker run -d \
              --name front-despacho-container \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest