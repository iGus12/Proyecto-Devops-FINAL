AWSTemplateFormatVersion: '2010-09-09'
Description: 'Plantilla maestra de CloudFormation para la plataforma elástica serverless de Innovatech Chile - Duoc UC'

Parameters:
  AWSAccountId:
    Type: String
    Default: '020935060597'
    Description: 'ID de la cuenta académica de AWS Academy'

  VpcCIDR:
    Type: String
    Default: '10.0.0.0/16'

  PublicSubnet1CIDR:
    Type: String
    Default: '10.0.1.0/24'

  PublicSubnet2CIDR:
    Type: String
    Default: '10.0.2.0/24'

  DBUsername:
    Type: String
    Default: 'root'
    NoEcho: true

  DBPassword:
    Type: String
    Default: 'admin123'
    NoEcho: true

Resources:
  # ====================================================================
  # 1. RED Y CONECTIVIDAD (VPC, SUBREDES Y SEGURIDAD)
  # ====================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-innovatech

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: igw-innovatech

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: subnet-publica-1a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: subnet-publica-1b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: rtb-publica

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Grupo de subredes para base de datos RDS Multi-AZ'
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  # ====================================================================
  # 2. CAPAS DE SEGURIDAD (SECURITY GROUPS)
  # ====================================================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Permitir trafico HTTP publico hacia el ALB'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: SG-ALB

  ECSTasksSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Permitir trafico unicamente desde el ALB hacia contenedores'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: SG-BACKEND

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Permitir acceso a MySQL solo desde los contenedores del backend'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref ECSTasksSecurityGroup
      Tags:
        - Key: Name
          Value: SG-RDS

  # ====================================================================
  # 3. BALANCEADOR DE CARGA (ALB) Y ENRUTAMIENTO
  # ====================================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: alb-innovatech
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupFrontend

  # Grupos de Destino (Target Groups)
  TargetGroupFrontend:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tg-frontend
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: '/'
      HealthCheckIntervalSeconds: 30

  TargetGroupVentas:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tg-ventas
      Port: 8081
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: '/api/v1/ventas'
      HealthCheckIntervalSeconds: 30

  TargetGroupDespachos:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tg-despachos
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: '/api/v1/despachos'
      HealthCheckIntervalSeconds: 30

  # Reglas de Enrutamiento del ALB (Path-based Routing)
  RuleVentas:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - '/api/v1/ventas*'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupVentas

  RuleDespachos:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values:
            - '/api/v1/despachos*'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupDespachos

  # ====================================================================
  # 4. BASE DE DATOS DE PRODUCCIÓN (RDS MYSQL)
  # ====================================================================
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: rds-mysql-innovatech
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      DBName: db_innovatech
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      SkipFinalSnapshot: true

  # ====================================================================
  # 5. ORQUESTADOR SERVERLESS (ECS CLUSTER & SERVICES)
  # ====================================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: cluster-innovatech

  # Task Definitions (Definiciones de Tarea en Fargate)
  TaskFrontend:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: task-frontend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      TaskRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      ContainerDefinitions:
        - Name: frontend-container
          Image: !Sub '${AWSAccountId}.dkr.ecr.us-east-1.amazonaws.com/frontdespacho-:latest'
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: frontend

  TaskVentas:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: task-back-ventas
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      TaskRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      ContainerDefinitions:
        - Name: back-ventas-container
          Image: !Sub '${AWSAccountId}.dkr.ecr.us-east-1.amazonaws.com/back-ventas:latest'
          PortMappings:
            - ContainerPort: 8081
          Environment:
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub 'jdbc:mysql://${RDSInstance.Endpoint.Address}:3306/db_innovatech'
            - Name: SPRING_DATASOURCE_USERNAME
              Value: !Ref DBUsername
            - Name: SPRING_DATASOURCE_PASSWORD
              Value: !Ref DBPassword
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ventas

  TaskDespachos:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: task-back-despachos
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      TaskRoleArn: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      ContainerDefinitions:
        - Name: back-despachos-container
          Image: !Sub '${AWSAccountId}.dkr.ecr.us-east-1.amazonaws.com/backdespachos-:latest'
          PortMappings:
            - ContainerPort: 8080
          Environment:
            - Name: SPRING_DATASOURCE_URL
              Value: !Sub 'jdbc:mysql://${RDSInstance.Endpoint.Address}:3306/db_innovatech'
            - Name: SPRING_DATASOURCE_USERNAME
              Value: !Ref DBUsername
            - Name: SPRING_DATASOURCE_PASSWORD
              Value: !Ref DBPassword
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: despachos

  # Servicios de ECS corriendo bajo Fargate
  ServiceFrontend:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: svc-frontend
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskFrontend
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSTasksSecurityGroup
      LoadBalancers:
        - ContainerName: frontend-container
          ContainerPort: 80
          TargetGroupArn: !Ref TargetGroupFrontend

  ServiceVentas:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: svc-back-ventas
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskVentas
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSTasksSecurityGroup
      LoadBalancers:
        - ContainerName: back-ventas-container
          ContainerPort: 8081
          TargetGroupArn: !Ref TargetGroupVentas

  ServiceDespachos:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: svc-back-despachos
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDespachos
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSTasksSecurityGroup
      LoadBalancers:
        - ContainerName: back-despachos-container
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroupDespachos

  # ====================================================================
  # 6. OBSERVABILIDAD (CLOUDWATCH LOG GROUP)
  # ====================================================================
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/task-back-despachos
      RetentionInDays: 7

  # ====================================================================
  # 7. ELASTICIDAD Y ESCALABILIDAD HORIZONTAL (AUTO SCALING)
  # ====================================================================
  ECSAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSCluster}/${ServiceFrontend.ServiceName}'
      RoleARN: !Sub 'arn:aws:iam::${AWSAccountId}:role/LabRole'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  AutoScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: autoscale-cpu-front
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ECSAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 60

Outputs:
  ALBURL:
    Description: 'URL Publica del Application Load Balancer para acceder al Frontend'
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'